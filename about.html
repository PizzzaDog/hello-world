<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            font-family: 'Arial', sans-serif;
        }
        h1 {
            font-size: 3rem;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin: 0 0 1rem 0;
        }
        p {
            font-size: 1.25rem;
            color: rgba(255, 255, 255, 0.85);
            max-width: 500px;
            text-align: center;
            line-height: 1.6;
        }
        a {
            margin-top: 2rem;
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            border: 2px solid rgba(255, 255, 255, 0.5);
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            transition: background 0.2s, border-color 0.2s;
        }
        a:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: white;
        }
    </style>
</head>
<body>
    <h1>About Page</h1>
    <p>This is the second page of the Hello World project. Built with a matching gradient style and a link back home.</p>
    <a href="index.html">&larr; Back to Hello World</a>
</body>
</html>
